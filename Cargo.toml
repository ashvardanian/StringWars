[dependencies.bit-set]
optional = true
version = "0.8"

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2.177"
perf-event = "0.4"

[target.'cfg(target_arch = "x86_64")'.dependencies]
cityhash = {version = "0.1", optional = true}

[[bench]]
harness = false
name = "bench_find"
path = "find/bench.rs"
required-features = ["bench_find"]

[[bench]]
harness = false
name = "bench_tokenization"
path = "tokenization/bench.rs"
required-features = ["bench_tokenization"]

[[bench]]
harness = false
name = "bench_normalization"
path = "normalization/bench.rs"
required-features = ["bench_normalization"]

[[bench]]
harness = false
name = "bench_similarities"
path = "similarities/bench.rs"
required-features = ["bench_similarities"]

[[bench]]
harness = false
name = "bench_hash"
path = "hash/bench.rs"
required-features = ["bench_hash"]

[[bench]]
harness = false
name = "bench_sequence"
path = "sequence/bench.rs"
required-features = ["bench_sequence"]

[[bench]]
harness = false
name = "bench_containers"
path = "containers/bench.rs"
required-features = ["bench_containers"]

[[bench]]
harness = false
name = "bench_memory"
path = "memory/bench.rs"
required-features = ["bench_memory"]

[[bench]]
harness = false
name = "bench_fingerprints"
path = "fingerprints/bench.rs"
required-features = ["bench_fingerprints"]

[[bench]]
harness = false
name = "bench_encryption"
path = "encryption/bench.rs"
required-features = ["bench_encryption"]

[profile.release]
# Incremental release builds: after the first full optimize, editing a single bench.rs
# recompiles only the changed codegen units instead of the whole crate, cutting the
# measurement-build turnaround. Dependency crates (where the kernels live) stay fully cached.
incremental = true
